name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
        continue-on-error: true  # no tests yet — remove this once tests exist

  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: lint-build-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stamp dev version (develop only)
        if: github.ref == 'refs/heads/develop'
        run: |
          BASE_VERSION=$(node -p "require('./apps/vscode/package.json').version")
          DEV_VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}"
          echo "VERSION=${DEV_VERSION}" >> $GITHUB_ENV
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./apps/vscode/package.json', 'utf8'));
            pkg.version = '${DEV_VERSION}';
            fs.writeFileSync('./apps/vscode/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Stamped dev version: ${DEV_VERSION}"

      - name: Read release version (master only)
        if: github.ref == 'refs/heads/master'
        run: |
          VERSION=$(node -p "require('./apps/vscode/package.json').version")
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Release version: ${VERSION}"

      - name: Build all packages
        run: pnpm build

      - name: Package VSIX
        run: cd apps/vscode && pnpm run package:vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: event-horizon-${{ env.VERSION }}.vsix
          path: apps/vscode/*.vsix
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        run: |
          VERSION=$(node -p "require('./apps/vscode/package.json').version")
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: event-horizon-${{ env.VERSION }}.vsix
          path: ./artifacts

      - name: Create git tag
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          files: ./artifacts/*.vsix
          generate_release_notes: true
