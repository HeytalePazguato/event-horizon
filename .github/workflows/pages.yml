name: Deploy site

# Deploys two things to GitHub Pages from a single artifact:
#   - the landing page  (website/index.html)            -> /
#   - the user manual   (MkDocs, source in docs/manual/) -> /manual/
# The manual is built into website/manual/ so both ship together.

on:
  push:
    branches: [master]
    paths:
      - 'website/**'
      - 'docs/manual/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: pip install -r requirements.txt

      - name: Build user manual
        run: mkdocs build --strict
        # mkdocs.yml sets site_dir: website/manual

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
